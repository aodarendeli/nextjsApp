services:
  freestudio-next:
    image: ghcr.io/${{ github.repository }}:latest
    container_name: freestudio-next
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - freestudio-next
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  freestudio-next:
    driver: bridge