version: "3.9"

services:
  nexus-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENV_FILE: .env.development
    container_name: freestudio-next
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - freestudio-next
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Uncomment to add nginx reverse proxy ─────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: nexus-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - nexus-web
  #   networks:
  #     - nexus-net

networks:
  nexus-net:
    driver: bridge
